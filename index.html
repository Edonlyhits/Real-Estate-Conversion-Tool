<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>房地產換算神器</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;600&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* ── BACKGROUNDS (light theme) ── */
            --bg-base:    #f2f4f7;
            --bg-card:    #ffffff;
            --bg-inset:   #eaecf1;
            --bg-badge:   #dde1ea;
            --border:     rgba(0,0,0,0.10);

            /* ── GOLD (slightly deepened for light bg readability) ── */
            --gold:       #c48a00;
            --gold-dim:   rgba(196,138,0,0.10);
            --gold-border:rgba(196,138,0,0.38);

            /* ── TEXT TIERS (inverted for light bg) ── */
            --txt-white:  #111318;      /* primary values — near black */
            --txt-bright: #353c50;      /* labels, secondary info */
            --txt-mid:    #6b7385;      /* tertiary / units */
            --txt-dim:    #b0b8c8;      /* placeholder, disabled */

            --accent-red:   #d93030;
            --accent-green: #1a9e72;

            /* ── UNIT BADGES (adjusted for white bg) ── */
            --unit-sqm-bg:   rgba(37,99,235,0.10);
            --unit-sqm-txt:  #2563eb;
            --unit-sqft-bg:  rgba(109,40,217,0.10);
            --unit-sqft-txt: #7c3aed;
            --unit-ping-bg:  rgba(180,130,0,0.12);
            --unit-ping-txt: #a67800;
            --unit-aed-bg:   rgba(5,150,105,0.10);
            --unit-aed-txt:  #0a7c57;
            --unit-twd-bg:   rgba(220,38,38,0.10);
            --unit-twd-txt:  #b91c1c;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-base);
            color: var(--txt-white);
            min-height: 100vh;
            padding: 48px 20px 60px;
            /* subtle dot grid — dark on light */
            background-image: radial-gradient(circle, rgba(0,0,0,0.055) 1px, transparent 1px);
            background-size: 28px 28px;
        }

        .wrapper {
            max-width: 560px;
            margin: 0 auto;
        }

        /* ── HEADER ── */
        header {
            text-align: center;
            margin-bottom: 36px;
        }
        .header-tag {
            display: inline-block;
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.65em;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            color: var(--gold);
            border: 1px solid var(--gold-border);
            padding: 4px 12px;
            border-radius: 2px;
            margin-bottom: 14px;
            background: var(--gold-dim);
        }
        header h1 {
            font-family: 'Inter', sans-serif;
            font-weight: 700;
            font-size: 1.95em;
            color: var(--txt-white);
            letter-spacing: -0.02em;
        }
        header h1 .sub {
            color: var(--txt-mid);
            font-weight: 400;
            font-size: 0.6em;
            display: block;
            letter-spacing: 0.04em;
            margin-top: 6px;
            font-family: 'IBM Plex Mono', monospace;
        }

        /* ── CARD ── */
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 24px;
            margin-bottom: 14px;
            animation: fadeUp 0.4s ease both;
            box-shadow: 0 1px 4px rgba(0,0,0,0.06);
        }
        .card:nth-child(2) { animation-delay: 0.07s; }
        .card:nth-child(3) { animation-delay: 0.14s; }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(10px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .section-title {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
        }
        .section-num {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.65em;
            color: var(--gold);
            border: 1px solid var(--gold-border);
            padding: 2px 7px;
            border-radius: 3px;
            background: var(--gold-dim);
            letter-spacing: 0.05em;
        }
        .section-name {
            font-size: 0.8em;
            font-weight: 600;
            color: var(--txt-bright);
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }
        .section-line {
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        /* ── INPUT GROUPS ── */
        .flex-row {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
        }
        .input-group { position: relative; }

        label {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 7px;
            font-size: 0.72em;
            font-weight: 600;
            color: var(--txt-bright);
            letter-spacing: 0.03em;
            text-transform: uppercase;
        }

        /* Coloured unit badge inside label */
        .badge {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.85em;
            font-weight: 400;
            padding: 1px 6px;
            border-radius: 3px;
            letter-spacing: 0.05em;
        }
        .badge-sqm  { background: var(--unit-sqm-bg);  color: var(--unit-sqm-txt);  }
        .badge-sqft { background: var(--unit-sqft-bg); color: var(--unit-sqft-txt); }
        .badge-ping { background: var(--unit-ping-bg); color: var(--unit-ping-txt); }
        .badge-aed  { background: var(--unit-aed-bg);  color: var(--unit-aed-txt);  }
        .badge-twd  { background: var(--unit-twd-bg);  color: var(--unit-twd-txt);  }

        input {
            width: 100%;
            padding: 11px 13px;
            background: var(--bg-inset);
            border: 1px solid var(--border);
            border-radius: 4px;
            color: var(--txt-white);
            font-family: 'IBM Plex Mono', monospace;
            font-size: 1em;
            font-weight: 400;
            outline: none;
            transition: border-color 0.18s, box-shadow 0.18s;
            -moz-appearance: textfield;
        }
        input::-webkit-inner-spin-button,
        input::-webkit-outer-spin-button { -webkit-appearance: none; }
        input::placeholder {
            color: var(--txt-dim);
            font-weight: 300;
        }
        input:focus {
            border-color: var(--gold-border);
            box-shadow: 0 0 0 3px var(--gold-dim);
        }

        /* wide input for price */
        .input-wide { margin-bottom: 16px; }

        /* ── RATES PANEL ── */
        .rates-panel {
            background: var(--bg-inset);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 16px 18px;
            margin-top: 4px;
        }
        .rates-header {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.62em;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--txt-mid);
            margin-bottom: 10px;
        }
        #rate-display {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .rate-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 0.82em;
        }
        .rate-from {
            font-family: 'IBM Plex Mono', monospace;
            color: var(--txt-mid);
        }
        .rate-arrow { color: var(--txt-dim); margin: 0 6px; }
        .rate-to {
            font-family: 'IBM Plex Mono', monospace;
            font-weight: 600;
            color: var(--txt-white);
        }
        .rate-currency { font-weight: 400; color: var(--txt-mid); margin-left: 4px; }
        #rate-display.loading {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.78em;
            color: var(--txt-dim);
            font-style: italic;
        }

        /* ── RESULTS ── */
        .results-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 14px;
        }
        .result-tile {
            background: var(--bg-inset);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 18px 16px;
        }
        .result-tile-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }
        .result-tile-label {
            font-size: 0.6em;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--txt-mid);
            font-weight: 600;
        }
        .result-val {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 1.55em;
            font-weight: 600;
            color: var(--txt-white);
            line-height: 1;
            transition: color 0.2s;
        }
        .result-val.inactive {
            font-size: 0.75em;
            color: var(--txt-dim);
            font-weight: 300;
        }
        .result-unit-row {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-top: 8px;
        }
        .result-unit-text {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.65em;
            color: var(--txt-mid);
        }

        /* ── FOOTER ── */
        footer {
            text-align: center;
            margin-top: 28px;
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.6em;
            color: var(--txt-dim);
            letter-spacing: 0.18em;
        }
    </style>
</head>
<body>
<div class="wrapper">

    <header>
        <div class="header-tag">業務用工具 · Sales Tool</div>
        <h1>房地產換算神器
            <span class="sub">Real Estate Unit Converter</span>
        </h1>
    </header>

    <!-- CARD 1: SIZE -->
    <div class="card">
        <div class="section-title">
            <span class="section-num">01</span>
            <span class="section-name">面積換算 &nbsp;·&nbsp; Property Size</span>
            <span class="section-line"></span>
        </div>
        <div class="flex-row">
            <div class="input-group">
                <label>平方公尺 <span class="badge badge-sqm">m²</span></label>
                <input type="number" id="input-sqm" placeholder="100">
            </div>
            <div class="input-group">
                <label>平方英尺 <span class="badge badge-sqft">ft²</span></label>
                <input type="number" id="input-sqft" placeholder="1076">
            </div>
            <div class="input-group">
                <label>坪 <span class="badge badge-ping">坪</span></label>
                <input type="number" id="input-ping" placeholder="30.25">
            </div>
        </div>
    </div>

    <!-- CARD 2: PRICE -->
    <div class="card">
        <div class="section-title">
            <span class="section-num">02</span>
            <span class="section-name">單價計算 &nbsp;·&nbsp; Price Metrics</span>
            <span class="section-line"></span>
        </div>

        <div class="input-wide">
            <label>總價 <span class="badge badge-aed">AED</span></label>
            <input type="number" id="input-price-aed" placeholder="1,500,000">
        </div>

        <div class="rates-panel">
            <div class="rates-header">即時匯率 · Live Rates &nbsp;(Base: 1 AED)</div>
            <div id="rate-display" class="loading">取得匯率中…</div>
        </div>

        <div class="results-grid">
            <div class="result-tile">
                <div class="result-tile-header">
                    <div class="result-tile-label">每平方英尺</div>
                    <span class="badge badge-aed">AED</span>
                </div>
                <div class="result-val inactive" id="price-per-sqft">—</div>
                <div class="result-unit-row">
                    <span class="result-unit-text">per</span>
                    <span class="badge badge-sqft">ft²</span>
                </div>
            </div>
            <div class="result-tile">
                <div class="result-tile-header">
                    <div class="result-tile-label">每坪</div>
                    <span class="badge badge-twd">TWD</span>
                </div>
                <div class="result-val inactive" id="price-per-ping">—</div>
                <div class="result-unit-row">
                    <span class="result-unit-text">per</span>
                    <span class="badge badge-ping">坪</span>
                </div>
            </div>
        </div>
    </div>

    <footer>AED · USD · EUR · TWD &nbsp;|&nbsp; m² · ft² · 坪 &nbsp;|&nbsp; open.er-api.com</footer>
</div>

<script>
    const SQM_TO_SQFT = 10.7639104;
    const SQM_TO_PING = 0.3025;

    const elSqm         = document.getElementById('input-sqm');
    const elSqft        = document.getElementById('input-sqft');
    const elPing        = document.getElementById('input-ping');
    const elPriceAed    = document.getElementById('input-price-aed');
    const elRateDisplay = document.getElementById('rate-display');
    const elPpSqft      = document.getElementById('price-per-sqft');
    const elPpPing      = document.getElementById('price-per-ping');

    let rates = { USD: 0, EUR: 0, TWD: 0 };

    async function fetchExchangeRates() {
        try {
            const res  = await fetch('https://open.er-api.com/v6/latest/AED');
            const data = await res.json();
            rates.USD = data.rates.USD;
            rates.EUR = data.rates.EUR;
            rates.TWD = data.rates.TWD;

            elRateDisplay.classList.remove('loading');
            elRateDisplay.innerHTML = `
                <div class="rate-row">
                    <span class="rate-from">1 AED</span>
                    <span class="rate-arrow">→</span>
                    <span class="rate-to">${rates.USD.toFixed(4)}<span class="rate-currency">USD</span></span>
                </div>
                <div class="rate-row">
                    <span class="rate-from">1 AED</span>
                    <span class="rate-arrow">→</span>
                    <span class="rate-to">${rates.EUR.toFixed(4)}<span class="rate-currency">EUR</span></span>
                </div>
                <div class="rate-row">
                    <span class="rate-from">1 AED</span>
                    <span class="rate-arrow">→</span>
                    <span class="rate-to">${rates.TWD.toFixed(2)}<span class="rate-currency">TWD</span></span>
                </div>`;
            calculateMetrics();
        } catch (err) {
            elRateDisplay.innerHTML = '<span style="color:#d93030;font-size:0.8em;">匯率取得失敗 — 請檢查網路</span>';
            console.error('API Error:', err);
        }
    }

    function updateArea(source) {
        const val = parseFloat(source.value);
        if (isNaN(val) || val <= 0) {
            if (source !== elSqm)  elSqm.value  = '';
            if (source !== elSqft) elSqft.value = '';
            if (source !== elPing) elPing.value = '';
            calculateMetrics();
            return;
        }
        let sqm = 0;
        if (source.id === 'input-sqm') {
            sqm = val;
            elSqft.value = (sqm * SQM_TO_SQFT).toFixed(2);
            elPing.value = (sqm * SQM_TO_PING).toFixed(2);
        } else if (source.id === 'input-sqft') {
            sqm = val / SQM_TO_SQFT;
            elSqm.value  = sqm.toFixed(2);
            elPing.value = (sqm * SQM_TO_PING).toFixed(2);
        } else if (source.id === 'input-ping') {
            sqm = val / SQM_TO_PING;
            elSqm.value  = sqm.toFixed(2);
            elSqft.value = (sqm * SQM_TO_SQFT).toFixed(2);
        }
        calculateMetrics();
    }

    function setResult(el, text, active) {
        el.textContent = text;
        if (active) {
            el.classList.remove('inactive');
        } else {
            el.classList.add('inactive');
        }
    }

    function calculateMetrics() {
        const priceAed = parseFloat(elPriceAed.value);
        const sqft     = parseFloat(elSqft.value);
        const ping     = parseFloat(elPing.value);

        if (isNaN(priceAed) || priceAed <= 0) {
            setResult(elPpSqft, '請輸入總價', false);
            setResult(elPpPing, '請輸入總價', false);
            return;
        }
        if (!isNaN(sqft) && sqft > 0) {
            setResult(elPpSqft, (priceAed / sqft).toFixed(2), true);
        } else {
            setResult(elPpSqft, '請輸入面積', false);
        }
        if (!isNaN(ping) && ping > 0 && rates.TWD > 0) {
            setResult(elPpPing, Math.round((priceAed * rates.TWD) / ping).toLocaleString(), true);
        } else {
            setResult(elPpPing, rates.TWD > 0 ? '請輸入面積' : '載入中…', false);
        }
    }

    elSqm.addEventListener('input',      () => updateArea(elSqm));
    elSqft.addEventListener('input',     () => updateArea(elSqft));
    elPing.addEventListener('input',     () => updateArea(elPing));
    elPriceAed.addEventListener('input', calculateMetrics);

    window.onload = fetchExchangeRates;
</script>
</body>
</html>
